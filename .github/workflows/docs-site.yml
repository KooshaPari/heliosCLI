name: Docs Site

# NOTE: Billable runs disabled - use pre-commit/pre-push hooks for validation
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package.json
      - name: Install deps
        working-directory: docs
        run: npm install
      - name: Build docs
        working-directory: docs
        run: npm run docs:build
